name: tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 0
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
  TERM: xterm-256color

on:
  pull_request:
    branches:
      - main
    paths:
      - "tests/**"
      - "share/**"
      - "zinit*.zsh"
      - ".github/workflows/tests.yaml"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  zunit-tests:
    name: ${{ matrix.zunit_test }} | ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        zunit_test:
          - annexes
          - commands
          - compile
          - config-zstyle
          - gh-r
          - ices
          - plugins
          - snippets
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: install homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c
        
      - name: "install musl"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update --yes
          sudo apt-get install --no-install-recommends --yes \
            autoconf automake autotools-dev \
            build-essential byacc \
            file \
            gcc gettext glibc-source grep \
            libc6 libc6-dev libevent-dev libncurses5-dev libncursesw5-dev libtool libuvc0 lua5.1 \
            m4 \
            ninja-build \
            pkg-config \
            xz-utils \
            zsh

      - name: "install dependencies"
        id: install-deps
        run: |
          brew install --force --overwrite autoconf automake binutils byacc coreutils curl gettext gnu-sed libevent libtool libuv lua lua@5.4 make ncurses ninja parallel pkg-config texinfo unzip xz zsh
          brew link --force --overwrite ncurses

      - name: "install zunit"
        id: install-zunit
        shell: zsh {0}
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          git clone --branch='feat/run-tests-in-parallel-support' https://github.com/zdharma-continuum/zunit
          cd ./zunit
          ./configure --prefix=$HOME/.local
          make all install

      - name: "run tests"
        shell: zsh {0}
        run: zunit run -p tests/${{ matrix.zunit_test }}.zunit
