name: label
on:
  pull_request_target: # https://securitylab.github.com/research/github-actions-preventing-pwn-requests

jobs:
  label-pull-requests:
    name: "pull requests"

    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
    - uses: actions/labeler@v7
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        sync-labels: true
